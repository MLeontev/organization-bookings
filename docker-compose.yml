services:
  frontend:
    image: organization-bookings.frontend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://localhost:8082}
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-organization-bookings}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-bookings-public-client}
    ports:
      - '3001:80'
    restart: always
    networks:
      - booking-network

networks:
  booking-network:
    external: true
